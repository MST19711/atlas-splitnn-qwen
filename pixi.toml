[workspace]
channels = ["conda-forge"]
name = "qwen3-atlas-slm"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.10.*"
transformers = ">=5.10.2,<6"
onnx = ">=1.21.0,<2"
onnxruntime = ">=1.26.0,<2"
numpy = ">=2.2.6,<3"
safetensors = ">=0.7.0,<0.8"
huggingface_hub = ">=1.18.0,<2"

[pypi-dependencies]
torch = ">=2.6.0"
accelerate = ">=1.13.0,<2"
fastapi = ">=0.116.1,<0.117"
uvicorn = ">=0.35.0,<0.36"
pydantic = ">=2.11.7,<3"
pytest = ">=9.1.1, <10"
